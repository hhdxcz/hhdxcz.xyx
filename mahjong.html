<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>麻将</title>
    <link rel="stylesheet" href="./static/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div class="row wrap">
          <a class="link" id="backLink" href="./room.html">← 返回房间</a>
          <span class="chip" id="roomChip"></span>
          <span class="chip" id="nameChip"></span>
        </div>
        <h1 class="title">麻将</h1>
        <p class="subtitle" id="statusText"></p>
      </header>

      <section class="panel mjBoard">
        <div class="mjTop">
          <div class="mjSeat">
            <div class="mjSeatTitle" id="p2Title"></div>
            <div class="mjMeta muted" id="p2Meta"></div>
            <div class="mjRiver" id="p2River"></div>
          </div>
        </div>

        <div class="mjMid">
          <div class="mjSeat">
            <div class="mjSeatTitle" id="p3Title"></div>
            <div class="mjMeta muted" id="p3Meta"></div>
            <div class="mjRiver" id="p3River"></div>
          </div>

          <div class="mjCenter">
            <div class="mjWall muted" id="wallText"></div>
            <div class="mjLast muted" id="lastText"></div>
            <div class="mjHint muted" id="hintText"></div>
          </div>

          <div class="mjSeat">
            <div class="mjSeatTitle" id="p1Title"></div>
            <div class="mjMeta muted" id="p1Meta"></div>
            <div class="mjRiver" id="p1River"></div>
          </div>
        </div>

        <div class="divider" role="separator"></div>

        <div class="mjMe">
          <div class="mjHand" id="myHand"></div>
          <div class="row wrap">
            <button class="btn primary" id="discardBtn" type="button">打出</button>
            <button class="btn" id="riichiBtn" type="button">立直</button>
            <button class="btn primary hidden" id="huBtn" type="button">胡牌</button>
            <button class="btn" id="resetBtn" type="button">重新开始</button>
          </div>
          <div class="row wrap hidden" id="reactBar">
            <button class="btn primary" id="reactHuBtn" type="button">胡</button>
            <button class="btn" id="reactKanBtn" type="button">杠</button>
            <button class="btn" id="reactPonBtn" type="button">碰</button>
            <button class="btn" id="reactChiBtn" type="button">吃</button>
            <button class="btn" id="reactPassBtn" type="button">过</button>
          </div>
          <div class="mjToast muted" id="toast"></div>
        </div>
      </section>
    </main>

    <dialog class="ddzDialog" id="chiDialog">
      <div class="ddzDialogTitle">选择吃法</div>
      <div class="ddzDialogHint muted" id="chiHint"></div>
      <div class="row wrap" id="chiOptions"></div>
      <div class="row wrap">
        <button class="btn" id="chiCancelBtn" type="button">取消</button>
      </div>
    </dialog>

    <script type="module" src="./static/mahjong.js"></script>
  </body>
</html>

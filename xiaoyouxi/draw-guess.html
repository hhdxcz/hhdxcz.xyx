<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>你画我猜</title>
    <link rel="stylesheet" href="./static/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div class="row wrap">
          <a class="link" id="backLink" href="./room.html">← 返回房间</a>
          <span class="chip" id="roomChip"></span>
          <span class="chip" id="roleChip"></span>
        </div>
        <h1 class="title">你画我猜</h1>
        <p class="subtitle" id="statusText"></p>
      </header>
      <section class="panel dgPanel">
        <div class="dgTop">
          <div class="dgBoardBox">
            <canvas class="dgCanvas" id="canvas"></canvas>
            <div class="dgOverlay muted" id="overlayText"></div>
          </div>
          <div class="dgSide">
            <div class="stack gap-8">
              <div class="row wrap">
                <span class="chip" id="roundChip"></span>
                <span class="chip" id="timerChip"></span>
              </div>
              <div class="dgBar" aria-hidden="true">
                <div class="dgBarFill" id="timerBar"></div>
              </div>
              <div class="dgScore" id="scoreList" aria-label="分数榜"></div>
              <div class="label">题目</div>
              <div class="dgAnswer chip" id="answerChip"></div>
              <div class="row wrap" id="wordOptions"></div>
              <div class="row wrap">
                <button class="btn" id="nextBtn" type="button">下一题</button>
                <button class="btn" id="clearBtn" type="button">清空画板</button>
                <button class="btn" id="undoBtn" type="button">撤销</button>
              </div>
              <div class="row wrap">
                <button class="btn small" id="penBtn" type="button">画笔</button>
                <button class="btn small" id="eraserBtn" type="button">橡皮</button>
                <input class="dgRange" id="widthRange" type="range" min="2" max="22" value="6" />
              </div>
              <div class="dgColors row wrap" id="colorRow"></div>
            </div>
            <div class="divider" role="separator"></div>
            <div class="stack gap-8">
              <div class="label">聊天</div>
              <div class="dgChat" id="chatLog" aria-label="聊天记录"></div>
              <div class="row">
                <input class="input" id="guessInput" maxlength="30" placeholder="输入猜测..." />
                <button class="btn primary" id="sendBtn" type="button">发送</button>
              </div>
              <p class="hint muted" id="hintText"></p>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="./static/draw_guess.js"></script>
  </body>
</html>

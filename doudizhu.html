<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>斗地主</title>
    <link rel="stylesheet" href="./static/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div class="row wrap">
          <a class="link" id="backLink" href="./room.html">← 返回房间</a>
          <span class="chip" id="roomChip"></span>
          <span class="chip" id="roleChip"></span>
        </div>
        <h1 class="title">斗地主</h1>
        <p class="subtitle" id="statusText"></p>
      </header>

      <section class="panel ddzBoard">
        <div class="ddzTop">
          <div class="ddzSeat">
            <div class="ddzSeatTitle" id="ai2Title"></div>
            <div class="ddzLastPlay muted" id="ai2Play"></div>
            <div class="ddzCount muted" id="ai2Count"></div>
          </div>
          <div class="ddzCenter">
            <div class="ddzPile muted" id="centerPile"></div>
            <div class="ddzLastPlay" id="lastPlayText"></div>
            <div class="ddzLandlordCards muted" id="bottomCards"></div>
          </div>
          <div class="ddzSeat">
            <div class="ddzSeatTitle" id="ai1Title"></div>
            <div class="ddzLastPlay muted" id="ai1Play"></div>
            <div class="ddzCount muted" id="ai1Count"></div>
          </div>
        </div>

        <div class="divider" role="separator"></div>

        <div class="ddzMe">
          <div class="ddzHand" id="myHand" aria-label="我的手牌"></div>
          <div class="ddzActions row wrap">
            <button class="btn primary" id="playBtn" type="button">出牌</button>
            <button class="btn" id="passBtn" type="button">不出</button>
            <button class="btn" id="hintBtn" type="button">提示</button>
            <button class="btn" id="resetBtn" type="button">重新开始</button>
          </div>
          <div class="ddzToast muted" id="toast"></div>
        </div>
      </section>

      <dialog class="ddzDialog" id="bidDialog">
        <div class="ddzDialogTitle">叫分/抢地主</div>
        <div class="ddzDialogHint muted">选择一个分数，最高分成为地主。</div>
        <div class="row wrap">
          <button class="btn" data-bid="0" type="button">不叫</button>
          <button class="btn" data-bid="1" type="button">1 分</button>
          <button class="btn" data-bid="2" type="button">2 分</button>
          <button class="btn primary" data-bid="3" type="button">3 分</button>
        </div>
      </dialog>
    </main>

    <script type="module" src="./static/doudizhu.js"></script>
  </body>
</html>

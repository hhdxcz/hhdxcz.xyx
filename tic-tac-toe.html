<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>井字棋</title>
    <link rel="stylesheet" href="./static/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div class="row wrap">
          <a class="link" id="backLink" href="./room.html">← 返回房间</a>
          <span class="chip" id="roomChip"></span>
          <span class="chip" id="roleChip"></span>
        </div>
        <h1 class="title">井字棋</h1>
        <p class="subtitle" id="statusText"></p>
      </header>
      <section class="panel tttPanel">
        <div class="tttBoard" id="board" aria-label="井字棋棋盘"></div>
        <div class="row wrap">
          <button class="btn" id="resetBtn" type="button">重新开始</button>
        </div>
        <p class="hint muted" id="hintText"></p>
      </section>
    </main>
    <script type="module" src="./static/tic_tac_toe.js"></script>
  </body>
</html>

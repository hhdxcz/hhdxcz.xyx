<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>小游戏大厅</title>
    <link rel="stylesheet" href="./static/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1 class="title">小游戏大厅</h1>
        <div class="row wrap">
          <p class="subtitle">选择一个游戏进入房间页</p>
          <span class="chip" id="playerNameChip"></span>
          <button class="btn small" id="nameBtn" type="button">设置名字</button>
        </div>
      </header>

      <section class="panel">
        <div id="games" class="grid" role="list"></div>
      </section>

      <footer class="footer">
        <span class="muted">本地演示：仅包含大厅与房间流程</span>
      </footer>
    </main>

    <dialog class="ddzDialog" id="nameDialog">
      <div class="ddzDialogTitle">设置名字</div>
      <div class="ddzDialogHint muted">名字会在房间成员列表中显示（最多 12 个字）。</div>
      <div class="stack gap-8">
        <label class="label" for="nameInput">名字</label>
        <input id="nameInput" class="input" autocomplete="off" maxlength="12" />
        <div class="row wrap">
          <button class="btn" id="nameCancelBtn" type="button">取消</button>
          <button class="btn primary" id="nameSaveBtn" type="button">保存</button>
        </div>
      </div>
    </dialog>

    <script type="module" src="./static/lobby.js"></script>
  </body>
</html>
